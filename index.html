<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蕉大王的成长记录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        memphis: {
                            pink: '#FF6B6B',
                            yellow: '#FFE66D',
                            teal: '#4ECDC4',
                            purple: '#9B59B6',
                            dark: '#374151',
                        }
                    },
                    fontFamily: {
                        display: ['Fredoka', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Fredoka', -apple-system, sans-serif;
            background: #FFFDE7;
            min-height: 100vh;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .float-animation {
            animation: float 4s ease-in-out infinite;
        }
        .bounce-animation {
            animation: bounce-slow 2s ease-in-out infinite;
        }

        /* 食物卡片hover效果 */
        .food-card {
            transform: rotate(var(--rotate, 0deg));
            transition: all 0.3s ease;
        }

        .food-card:hover {
            transform: rotate(calc(var(--rotate, 0deg) * -1)) scale(1.03);
            box-shadow: 8px 8px 0 #374151;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 核心配置
        const BIRTH_DATE = '2025-10-25';
        const BABY_PHOTO_URL = 'https://jiaojiao-1257740345.cos.ap-nanjing.myqcloud.com/px_live_cover_BB088B3C-04E4-4CFD-BE3A-BCD54ED40EF8_L0_001_IMG_3070.jpg';

        // 数据库加载函数
        async function loadDatabase() {
            try {
                const response = await fetch('./数据/jiaojiao.db');
                if (!response.ok) throw new Error('数据库加载失败');
                const buffer = await response.arrayBuffer();
                // 使用全局配置的 initSqlJs
                const SQL = await window.initSqlJs({
                    locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
                });
                return new SQL.Database(new Uint8Array(buffer));
            } catch (error) {
                console.error('数据库加载错误：', error);
                return null;
            }
        }

        // 查询指定日期的数据（测试用：2026-06-06）
        function getTodayData(db) {
            const today = '2026-06-06'; // 测试用固定日期

            // 今日喂养
            const feedingResult = db.exec(`
                SELECT start_time, end_time, duration_min, type
                FROM feeding
                WHERE date(start_time) = '${today}'
                ORDER BY start_time DESC
            `);
            const feeding = feedingResult.length > 0 ? feedingResult[0].values : [];

            // 今日睡眠
            const sleepResult = db.exec(`
                SELECT start_time, end_time, duration_min
                FROM sleep
                WHERE date(start_time) = '${today}'
                ORDER BY start_time DESC
            `);
            const sleep = sleepResult.length > 0 ? sleepResult[0].values : [];

            // 今日尿布
            const diaperResult = db.exec(`
                SELECT datetime, has_poop, has_pee, note
                FROM diaper_change
                WHERE date(datetime) = '${today}'
                ORDER BY datetime DESC
            `);
            const diaper = diaperResult.length > 0 ? diaperResult[0].values : [];

            // 今日辅食
            const foodResult = db.exec(`
                SELECT start_time, food_name, amount_g
                FROM solid_food
                WHERE date(start_time) = '${today}'
                ORDER BY start_time DESC
            `);
            const food = foodResult.length > 0 ? foodResult[0].values : [];

            // 最近体重
            const weightResult = db.exec(`
                SELECT date, weight_kg, height_cm
                FROM weight
                ORDER BY date DESC
                LIMIT 1
            `);
            const weight = weightResult.length > 0 ? weightResult[0].values[0] : null;

            return { feeding, sleep, diaper, food, weight };
        }

        // 孟菲斯装饰组件
        const MemphisDot = ({ className, color = 'bg-memphis-pink', size = 'w-4 h-4' }) => (
            <div className={`absolute rounded-full ${color} ${size} ${className}`} />
        );

        const MemphisTriangle = ({ className, color = 'border-memphis-purple' }) => (
            <div
                className={`absolute ${className}`}
                style={{
                    width: 0,
                    height: 0,
                    borderLeft: '10px solid transparent',
                    borderRight: '10px solid transparent',
                    borderBottom: `18px solid ${color.includes('#') ? color : '#9B59B6'}`,
                }}
            />
        );

        const MemphisStar = ({ className, color = '#FFE66D' }) => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill={color} className={`absolute ${className}`}>
                <path d="M12 2L14.5 9L22 9.5L16.5 14L18.5 22L12 18L5.5 22L7.5 14L2 9.5L9.5 9L12 2Z"/>
            </svg>
        );

        // 主页面
        const BabyPage = () => {
            const [days, setDays] = useState(0);
            const [db, setDb] = useState(null);
            const [todayData, setTodayData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [allergenFoods, setAllergenFoods] = useState(null);
            const [showNameStory, setShowNameStory] = useState(false);

            // 食材到emoji的映射
            const foodEmojiMap = {
                '米粉': '🍚',
                '大米粥': '🥣',
                '南瓜': '🎃',
                '土豆': '🥔',
                '胡萝卜': '🥕',
                '菠菜': '🥬',
                '西兰花': '🥦',
                '西蓝花': '🥦',
                '紫甘蓝': '🥗',
                '山药': '🥔',
                '蛋黄': '🥚',
                '鸡蛋': '🥚',
                '猪肉': '🥩',
                '牛肉': '🍖',
                '核桃油': '🫒',
            };

            // 食材分类规则
            const categoryRules = {
                grains: ['米粉', '大米粥'],
                vegetables: ['南瓜', '土豆', '胡萝卜', '菠菜', '西兰花', '西蓝花', '紫甘蓝', '山药'],
                protein: ['蛋黄', '鸡蛋', '猪肉', '牛肉'],
                oils: ['核桃油']
            };

            // 从数据库解析排敏食物
            const parseAllergenFoods = (db) => {
                try {
                    // 查询所有辅食记录
                    const result = db.exec("SELECT food_name FROM solid_food WHERE food_name != '辅食内容'");
                    if (result.length === 0) return null;

                    // 提取所有食材（按+号分割）
                    const allIngredients = new Set();
                    result[0].values.forEach(row => {
                        const foods = row[0].split('+');
                        foods.forEach(food => {
                            // 去掉"泥"后缀，只保留核心食材名
                            const cleaned = food.replace(/泥/g, '').trim();
                            if (cleaned) allIngredients.add(cleaned);
                        });
                    });

                    // 按类别分类
                    const categorized = {
                        grains: [],
                        vegetables: [],
                        protein: [],
                        oils: []
                    };

                    allIngredients.forEach(ingredient => {
                        // 检查属于哪个类别
                        for (const [category, items] of Object.entries(categoryRules)) {
                            if (items.includes(ingredient)) {
                                categorized[category].push({
                                    name: ingredient,
                                    emoji: foodEmojiMap[ingredient] || '🍽️'
                                });
                                break;
                            }
                        }
                    });

                    return categorized;
                } catch (error) {
                    console.error('解析排敏食物失败：', error);
                    return null;
                }
            };

            useEffect(() => {
                // 计算天数
                const birth = new Date(BIRTH_DATE);
                const today = new Date();
                const diff = Math.ceil((today - birth) / (1000 * 60 * 60 * 24)) + 1;
                setDays(diff);

                // 加载数据库
                async function init() {
                    console.log('🔄 开始加载数据库...');
                    const database = await loadDatabase();
                    if (database) {
                        console.log('✅ 数据库加载成功');
                        setDb(database);

                        // 解析排敏食物
                        const foods = parseAllergenFoods(database);
                        setAllergenFoods(foods);
                        console.log('🥦 排敏食物：', foods);

                        const data = getTodayData(database);
                        setTodayData(data);
                        console.log('📊 今日数据：', data);
                    } else {
                        console.error('❌ 数据库加载失败');
                    }
                    setLoading(false);
                }
                init();
            }, []);

            // 计算月龄
            const calculateAge = () => {
                const birth = new Date(BIRTH_DATE);
                const today = new Date();
                let months = today.getFullYear() * 12 + today.getMonth() - birth.getFullYear() * 12 - birth.getMonth();
                let days = today.getDate() - birth.getDate();
                if (days < 0) {
                    months--;
                    const lastMonth = new Date(today.getFullYear(), today.getMonth(), 0);
                    days += lastMonth.getDate();
                }
                return { months, days };
            };

            // 获取星座
            const getZodiac = () => {
                const month = new Date(BIRTH_DATE).getMonth() + 1;
                const day = new Date(BIRTH_DATE).getDate();
                const zodiac = [
                    [1, 20, '♑', '摩羯座'], [2, 19, '♒', '水瓶座'], [3, 20, '♓', '双鱼座'],
                    [4, 20, '♈', '白羊座'], [5, 21, '♉', '金牛座'], [6, 21, '♊', '双子座'],
                    [7, 23, '♋', '巨蟹座'], [8, 23, '♌', '狮子座'], [9, 23, '♍', '处女座'],
                    [10, 23, '♎', '天秤座'], [11, 22, '♏', '天蝎座'], [12, 22, '♐', '射手座']
                ];
                for (const [m, d, emoji, name] of zodiac) {
                    if (month === m && day >= d) return { emoji, name };
                    if (month === m - 1 && day < d) return { emoji, name };
                }
                return { emoji: '♏', name: '天蝎座' };
            };

            // 获取生肖
            const getChineseZodiac = () => {
                const year = new Date(BIRTH_DATE).getFullYear();
                const animals = ['鼠', '牛', '虎', '兔', '龙', '蛇', '马', '羊', '猴', '鸡', '狗', '猪'];
                const emojis = ['🐭', '🐮', '🐯', '🐰', '🐲', '🐍', '🐴', '🐑', '🐵', '🐔', '🐶', '🐷'];
                const index = (year - 4) % 12;
                return { name: animals[index], emoji: emojis[index] };
            };

            // 月龄信息
            const age = calculateAge();
            const zodiac = getZodiac();
            const chineseZodiac = getChineseZodiac();

            return (
                <div className="min-h-screen bg-[#FFFDE7] relative overflow-hidden">
                    {/* 孟菲斯装饰元素 */}
                    <MemphisDot className="top-20 left-6 bg-memphis-pink w-5 h-5" />
                    <MemphisDot className="top-32 right-8 bg-memphis-teal w-3 h-3" />
                    <MemphisDot className="bottom-40 left-4 bg-memphis-yellow w-4 h-4" />
                    <MemphisTriangle className="top-24 right-16" />
                    <MemphisTriangle className="bottom-60 left-12 rotate-45" />
                    <MemphisStar className="top-40 left-16" />
                    <MemphisStar className="bottom-32 right-12 rotate-12" color="#FF6B6B" />

                    {/* 波浪装饰 */}
                    <svg className="absolute top-0 left-0 w-full h-32 opacity-20" viewBox="0 0 400 100" preserveAspectRatio="none">
                        <path d="M0,50 Q100,0 200,50 T400,50 L400,0 L0,0 Z" fill="#4ECDC4"/>
                    </svg>

                    {/* 主要内容 */}
                    <div className="relative z-10 px-5 py-8 max-w-md mx-auto">
                        {/* 顶部头像区域 */}
                        <div
                            className="flex flex-col items-center mb-8"
                            style={{ animation: 'fadeInUp 0.6s ease-out' }}
                        >
                            {/* 浮动头像 */}
                            <div className="relative mb-4">
                                {/* 装饰圆环 */}
                                <div className="absolute -inset-3 rounded-full border-4 border-dashed border-memphis-yellow opacity-60"
                                    style={{ animation: 'spin-slow 20s linear infinite' }} />

                                {/* 头像容器 */}
                                <div
                                    className="w-36 h-36 rounded-full bg-gradient-to-br from-memphis-pink via-memphis-yellow to-memphis-teal p-1.5 shadow-lg"
                                    style={{ animation: 'float 4s ease-in-out infinite' }}
                                >
                                    <div className="w-full h-full rounded-full bg-white p-1">
                                        <img
                                            src={BABY_PHOTO_URL}
                                            alt="蕉大王"
                                            className="w-full h-full rounded-full object-cover"
                                        />
                                    </div>
                                </div>

                                {/* 皇冠装饰 */}
                                <div className="absolute -top-2 -right-2 text-3xl bounce-animation">
                                    👑
                                </div>
                            </div>

                            {/* 名字 */}
                            <h1 className="text-2xl font-bold text-memphis-dark mb-1">
                                蕉大王
                            </h1>
                            <p className="text-sm text-gray-400 font-medium">
                                今天也是元气满满的一天！
                            </p>
                        </div>

                        {/* 年龄卡片 */}
                        <div
                            className="bg-white rounded-3xl p-6 mb-5 border-3 border-memphis-dark shadow-[6px_6px_0_#374151]"
                            style={{
                                animation: 'fadeInUp 0.6s ease-out 0.1s both',
                                borderWidth: '3px',
                            }}
                        >
                            <div className="text-center">
                                <p className="text-sm text-gray-400 mb-2 font-medium">已经出生</p>
                                <div className="flex items-baseline justify-center gap-2">
                                    <span className="text-5xl font-bold text-memphis-pink">{age.months}</span>
                                    <span className="text-lg text-memphis-dark font-semibold">个月</span>
                                    <span className="text-5xl font-bold text-memphis-teal">{age.days}</span>
                                    <span className="text-lg text-memphis-dark font-semibold">天</span>
                                </div>
                                <div className="mt-2 text-2xl font-bold text-memphis-dark">
                                    {days} 天龄
                                </div>
                                <div className="mt-3 text-sm text-gray-500">
                                    {zodiac.emoji} {zodiac.name} · {chineseZodiac.emoji} {chineseZodiac.name}年
                                </div>
                            </div>
                        </div>

                        {/* 名字故事卡片 */}
                        <div
                            className="rounded-3xl p-5 mb-5 border-3 border-memphis-dark shadow-[6px_6px_0_#374151] cursor-pointer hover:shadow-[8px_8px_0_#374151] hover:translate-x-[-2px] hover:translate-y-[-2px] transition-all duration-200"
                            style={{
                                animation: 'fadeInUp 0.6s ease-out 0.15s both',
                                borderWidth: '3px',
                                background: 'linear-gradient(135deg, #FFE4E6 0%, #FFF9C4 100%)',
                            }}
                            onClick={() => setShowNameStory(!showNameStory)}
                        >
                            <div className="flex items-center justify-between mb-3">
                                <div className="flex items-center gap-2">
                                    <span className="text-lg">📖</span>
                                    <span className="font-bold text-memphis-dark">名字的故事</span>
                                </div>
                                <span className="text-memphis-dark transition-transform duration-200" style={{ transform: showNameStory ? 'rotate(180deg)' : 'rotate(0deg)' }}>
                                    ▼
                                </span>
                            </div>

                            {/* 简短信息（始终显示） */}
                            <div className="flex items-center gap-3">
                                <div className="bg-memphis-yellow rounded-xl px-4 py-2 border-2 border-memphis-dark">
                                    <span className="font-bold text-memphis-dark text-lg">吴系舟</span>
                                </div>
                                <div className="text-sm text-gray-500">
                                    小名：蕉蕉 / 蕉大王
                                </div>
                            </div>

                            {/* 展开的详细内容 */}
                            {showNameStory && (
                                <div className="mt-4 pt-4 border-t border-gray-100">
                                    <div className="mb-4">
                                        <div className="text-sm font-semibold text-memphis-dark mb-2">📜 出处</div>
                                        <div className="text-sm text-gray-600 italic pl-3 border-l-3 border-memphis-yellow">
                                            《庄子》
                                        </div>
                                        <div className="text-sm text-gray-600 italic pl-3 mt-1">
                                            「一饱食而遨游，泛若不系之舟，虚而遨游者也。」
                                        </div>
                                    </div>

                                    <div>
                                        <div className="text-sm font-semibold text-memphis-dark mb-2">💝 父母寄愿</div>
                                        <div className="text-sm text-gray-600 leading-relaxed pl-3 border-l-3 border-memphis-teal">
                                            愿你如没有绳索的小船，自己把握航向，探索世界无拘无束，自在乘风随处可泊，亦可随时启航。
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 已排敏食物 */}
                        <div style={{ animation: 'fadeInUp 0.6s ease-out 0.2s both' }}>
                            <div className="flex items-center justify-between mb-4">
                                <div className="flex items-center gap-2">
                                    <span className="text-lg">📋</span>
                                    <span className="font-bold text-memphis-dark">已排敏食物</span>
                                </div>
                                <span className="text-sm text-memphis-dark font-bold tracking-wide">
                                    共{allergenFoods ?
                                        (allergenFoods.grains.length + allergenFoods.vegetables.length +
                                         allergenFoods.protein.length + allergenFoods.oils.length) : 0}种
                                </span>
                            </div>

                            {allergenFoods && (
                                <>
                                    {/* 谷物类卡片 - 橙色 */}
                                    {allergenFoods.grains.length > 0 && (
                                        <div className="food-card bg-[#F97316] rounded-2xl p-4 mb-3 border-2 border-memphis-dark shadow-[4px_4px_0_#374151] cursor-pointer"
                                            style={{ '--rotate': '-2deg' }}>
                                            <div className="flex items-center gap-2 mb-3">
                                                <span className="font-bold text-white text-lg">谷物类</span>
                                                <span className="text-sm text-white/80 font-bold">({allergenFoods.grains.length})</span>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {allergenFoods.grains.map((food, i) => (
                                                    <span key={i} className="bg-white/90 px-3 py-1.5 rounded-full text-sm font-medium text-memphis-dark">
                                                        {food.emoji} {food.name}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* 蔬菜类卡片 - 绿色 */}
                                    {allergenFoods.vegetables.length > 0 && (
                                        <div className="food-card bg-[#22C55E] rounded-2xl p-4 mb-3 border-2 border-memphis-dark shadow-[4px_4px_0_#374151] cursor-pointer"
                                            style={{ '--rotate': '2deg' }}>
                                            <div className="flex items-center gap-2 mb-3">
                                                <span className="font-bold text-white text-lg">蔬菜类</span>
                                                <span className="text-sm text-white/80 font-bold">({allergenFoods.vegetables.length})</span>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {allergenFoods.vegetables.map((food, i) => (
                                                    <span key={i} className="bg-white/90 px-3 py-1.5 rounded-full text-sm font-medium text-memphis-dark">
                                                        {food.emoji} {food.name}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* 肉禽海鲜类卡片 - 红色 */}
                                    {allergenFoods.protein.length > 0 && (
                                        <div className="food-card bg-[#EF4444] rounded-2xl p-4 mb-3 border-2 border-memphis-dark shadow-[4px_4px_0_#374151] cursor-pointer"
                                            style={{ '--rotate': '-2deg' }}>
                                            <div className="flex items-center gap-2 mb-3">
                                                <span className="font-bold text-white text-lg">肉禽海鲜类</span>
                                                <span className="text-sm text-white/80 font-bold">({allergenFoods.protein.length})</span>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {allergenFoods.protein.map((food, i) => (
                                                    <span key={i} className="bg-white/90 px-3 py-1.5 rounded-full text-sm font-medium text-memphis-dark">
                                                        {food.emoji} {food.name}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* 油脂类卡片 - 黄色 */}
                                    {allergenFoods.oils.length > 0 && (
                                        <div className="food-card bg-memphis-yellow rounded-2xl p-4 border-2 border-memphis-dark shadow-[4px_4px_0_#374151] cursor-pointer"
                                            style={{ '--rotate': '2deg' }}>
                                            <div className="flex items-center gap-2 mb-3">
                                                <span className="font-bold text-memphis-dark text-lg">油脂类</span>
                                                <span className="text-sm text-memphis-dark/80 font-bold">({allergenFoods.oils.length})</span>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {allergenFoods.oils.map((food, i) => (
                                                    <span key={i} className="bg-white/90 px-3 py-1.5 rounded-full text-sm font-medium text-memphis-dark">
                                                        {food.emoji} {food.name}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </>
                            )}
                        </div>

                        {/* 功能入口 */}
                        <div
